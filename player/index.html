<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audiobook-ish Player</title>
  <link rel="stylesheet" href="player.css" />
</head>
<body>
  <header class="topbar">
    <div class="title" id="title">audiobook-ish</div>
    <div class="page-indicator">Page <span id="page-num">—</span> / <span id="page-total">—</span></div>
  </header>

  <main class="layout">
    <section class="page-view" id="page-view">
      <div class="page-stage">
        <img id="page-image" alt="" />
        <div id="highlight-overlay" class="highlight-overlay"></div>
      </div>
    </section>

    <aside class="text-view" id="text-view">
      <ol id="sentence-list" class="sentence-list" aria-label="Sentences"></ol>
    </aside>
  </main>

  <footer class="controls">
    <button id="prev-sent" title="Previous sentence (j)">⏮</button>
    <button id="play-pause" title="Play/pause (space)">▶</button>
    <button id="next-sent" title="Next sentence (k)">⏭</button>
    <input type="range" id="scrubber" min="0" max="0" step="0.1" value="0" />
    <span class="time"><span id="time-current">0:00</span> / <span id="time-total">0:00</span></span>
    <label class="speed">
      Speed
      <select id="speed">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </label>
    <audio id="audio" preload="metadata" src="audiobook.mp3"></audio>
  </footer>

  <script src="player.js"></script>
</body>
</html>
